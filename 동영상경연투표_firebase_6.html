<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎬 동영상 경연대회</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nanum Gothic',sans-serif;background:#FFF8F0;min-height:100vh;overflow-x:hidden;}
.screen{display:none;min-height:100vh;padding:20px;flex-direction:column;align-items:center;justify-content:center;}
.screen.active{display:flex;}
#mode-screen{background:linear-gradient(135deg,#FF6B35,#FFB347);}
.mode-title{font-family:'Jua',sans-serif;font-size:clamp(30px,6vw,52px);color:#fff;text-align:center;margin-bottom:8px;text-shadow:0 2px 8px rgba(0,0,0,0.15);}
.mode-sub{color:rgba(255,255,255,0.85);font-size:16px;margin-bottom:40px;text-align:center;}
.mode-cards{display:flex;flex-direction:column;gap:16px;width:100%;max-width:380px;}
.mode-card{background:#fff;border-radius:20px;padding:24px;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(0,0,0,0.1);}
.mode-card:hover{transform:translateY(-3px);}
.mode-card:active{transform:scale(0.97);}
.mode-card-icon{font-size:36px;margin-bottom:8px;}
.mode-card-title{font-family:'Jua',sans-serif;font-size:20px;color:#333;margin-bottom:4px;}
.mode-card-desc{font-size:13px;color:#888;}

/* 비밀번호 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:999;display:none;}
.modal-bg.show{display:flex;}
.modal{background:#fff;border-radius:24px;padding:32px;width:90%;max-width:340px;text-align:center;box-shadow:0 12px 48px rgba(0,0,0,0.2);}
.modal h3{font-family:'Jua',sans-serif;font-size:22px;color:#333;margin-bottom:8px;}
.modal p{font-size:13px;color:#888;margin-bottom:20px;}
.modal input{width:100%;border:2px solid #eee;border-radius:12px;padding:14px;font-size:24px;text-align:center;letter-spacing:8px;outline:none;margin-bottom:16px;font-family:'Jua',sans-serif;}
.modal input:focus{border-color:#667eea;}
.modal input.error{border-color:#f44336;animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
.modal-btns{display:flex;gap:10px;}
.modal-cancel{flex:1;background:#f5f5f5;color:#666;border:none;border-radius:12px;padding:12px;font-family:'Jua',sans-serif;font-size:16px;cursor:pointer;}
.modal-ok{flex:1;background:#667eea;color:#fff;border:none;border-radius:12px;padding:12px;font-family:'Jua',sans-serif;font-size:16px;cursor:pointer;}

#teacher-screen{background:linear-gradient(135deg,#667eea,#764ba2);}
.teacher-card{background:#fff;border-radius:28px;padding:32px;width:100%;max-width:400px;box-shadow:0 12px 48px rgba(0,0,0,0.2);}
.t-label{font-family:'Jua',sans-serif;font-size:18px;color:#333;margin-bottom:12px;display:block;}
.count-wrap{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:28px;}
.count-btn{width:56px;height:56px;border-radius:50%;border:none;font-size:28px;cursor:pointer;transition:all .15s;box-shadow:0 2px 8px rgba(0,0,0,0.12);}
.count-btn.minus{background:#EDE7F6;color:#667eea;}
.count-btn.plus{background:#667eea;color:#fff;}
.count-btn:active{transform:scale(0.93);}
.count-num{font-family:'Jua',sans-serif;font-size:64px;color:#667eea;min-width:80px;text-align:center;line-height:1;}
.count-unit{font-size:15px;color:#aaa;text-align:center;font-family:'Jua',sans-serif;}
.t-start-btn{width:100%;background:#667eea;color:#fff;border:none;border-radius:16px;padding:16px;font-family:'Jua',sans-serif;font-size:20px;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(102,126,234,0.4);}
.t-start-btn:hover{background:#5a6fd6;transform:translateY(-2px);}

#teacher-control{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:24px 16px;justify-content:flex-start;padding-top:32px;}
.ctrl-header{text-align:center;margin-bottom:20px;width:100%;max-width:480px;}
.ctrl-header h2{font-family:'Jua',sans-serif;font-size:clamp(22px,5vw,36px);color:#fff;margin-bottom:4px;}
.ctrl-sub{color:rgba(255,255,255,0.5);font-size:13px;}
.ctrl-card{background:rgba(255,255,255,0.08);border-radius:24px;padding:24px;width:100%;max-width:480px;text-align:center;backdrop-filter:blur(8px);margin-bottom:14px;}
.ctrl-work-num{font-family:'Jua',sans-serif;font-size:52px;color:#FFD700;margin-bottom:2px;}
.ctrl-work-label{font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:16px;}
.vote-progress{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;}
.vote-done-num{font-family:'Jua',sans-serif;font-size:40px;color:#4CAF50;}
.vote-total-num{font-family:'Jua',sans-serif;font-size:22px;color:rgba(255,255,255,0.4);}
.vote-label{font-size:13px;color:rgba(255,255,255,0.5);}
.live-dots{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:18px;max-width:320px;margin-left:auto;margin-right:auto;}
.dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.2);transition:background .3s;}
.dot.voted{background:#4CAF50;}
.ctrl-next-btn{background:#FF6B35;color:#fff;border:none;border-radius:14px;padding:14px;font-family:'Jua',sans-serif;font-size:18px;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(255,107,53,0.3);margin-bottom:10px;display:block;width:100%;max-width:480px;}
.ctrl-next-btn:hover{background:#E85520;transform:translateY(-2px);}
.ctrl-result-btn{background:#FFD700;color:#333;border:none;border-radius:14px;padding:14px;font-family:'Jua',sans-serif;font-size:18px;cursor:pointer;transition:all .2s;display:block;width:100%;max-width:480px;}
.ctrl-result-btn:hover{background:#FFC200;transform:translateY(-2px);}

#vote-screen{background:#FFF8F0;justify-content:flex-start;padding-top:28px;}
.progress-area{width:100%;max-width:480px;margin-bottom:18px;}
.progress-track{background:#E8E8E8;border-radius:50px;height:8px;overflow:hidden;margin-bottom:6px;}
.progress-fill{height:100%;background:linear-gradient(90deg,#FF6B35,#FFB347);border-radius:50px;transition:width .5s;}
.progress-text{font-size:13px;color:#aaa;text-align:center;font-family:'Jua',sans-serif;}
.vote-card{background:#fff;border-radius:32px;padding:32px 24px;width:100%;max-width:480px;box-shadow:0 8px 32px rgba(0,0,0,0.08);text-align:center;}
.work-pill{display:inline-block;background:linear-gradient(135deg,#FF6B35,#FFB347);color:#fff;font-family:'Jua',sans-serif;font-size:15px;padding:6px 22px;border-radius:50px;margin-bottom:16px;}
.work-name{font-family:'Jua',sans-serif;font-size:clamp(28px,7vw,46px);color:#2D2D2D;margin-bottom:24px;}
.stars-row{display:flex;justify-content:center;gap:6px;margin-bottom:10px;}
.star-btn{font-size:clamp(44px,10vw,60px);cursor:pointer;line-height:1;user-select:none;filter:grayscale(1) opacity(0.3);transition:transform .1s,filter .1s;}
.star-btn.on{filter:none;}
.star-btn:active{transform:scale(0.88);}
.score-msg{font-family:'Jua',sans-serif;font-size:20px;color:#FF6B35;min-height:32px;margin-bottom:24px;}
.submit-btn{background:#FF6B35;color:#fff;border:none;border-radius:16px;padding:15px 48px;font-family:'Jua',sans-serif;font-size:19px;cursor:pointer;box-shadow:0 4px 16px rgba(255,107,53,0.35);transition:all .2s;}
.submit-btn:disabled{background:#E0E0E0;color:#aaa;box-shadow:none;cursor:default;}
.submit-btn:not(:disabled):hover{background:#E85520;transform:translateY(-2px);}
.wait-view,.done-view{flex-direction:column;align-items:center;justify-content:center;padding:40px 0;}
.wait-emoji,.done-emoji-el{font-size:72px;margin-bottom:16px;}
.wait-text,.done-text-el{font-family:'Jua',sans-serif;font-size:22px;color:#666;}
.done-text-el{color:#4CAF50;animation:pop .35s ease;}
.wait-sub,.done-sub{font-size:13px;color:#bbb;margin-top:8px;}
@keyframes pop{0%{transform:scale(0.2);opacity:0;}70%{transform:scale(1.2);}100%{transform:scale(1);opacity:1;}}

#result-screen{background:linear-gradient(160deg,#1a1a2e,#0f3460);padding:28px 16px;justify-content:flex-start;padding-top:36px;}
.result-title{font-family:'Jua',sans-serif;font-size:clamp(26px,6vw,46px);color:#fff;text-align:center;margin-bottom:6px;}
.result-sub{color:rgba(255,255,255,0.45);font-size:13px;text-align:center;margin-bottom:28px;}
.podium-wrap{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin-bottom:24px;width:100%;max-width:420px;}
.pod{flex:1;border-radius:14px 14px 0 0;display:flex;flex-direction:column;align-items:center;padding:12px 6px 10px;max-width:130px;}
.pod.p1{background:linear-gradient(180deg,#FFD700,#FFA000);height:160px;}
.pod.p2{background:linear-gradient(180deg,#E0E0E0,#9E9E9E);height:120px;}
.pod.p3{background:linear-gradient(180deg,#D4A76A,#8D6E63);height:95px;}
.pod-icon{font-size:28px;}
.pod-num{font-family:'Jua',sans-serif;font-size:15px;color:#fff;margin-top:4px;text-shadow:0 1px 3px rgba(0,0,0,0.3);}
.pod-score{font-family:'Jua',sans-serif;font-size:13px;color:rgba(255,255,255,0.85);margin-top:2px;}
.rank-list{width:100%;max-width:420px;margin-bottom:20px;}
.rank-row{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.07);border-radius:14px;padding:13px 14px;margin-bottom:7px;}
.rank-row.r1{background:rgba(255,215,0,0.18);border:1px solid rgba(255,215,0,0.3);}
.rank-row.r2{background:rgba(200,200,200,0.12);border:1px solid rgba(200,200,200,0.2);}
.rank-row.r3{background:rgba(205,140,80,0.14);border:1px solid rgba(205,140,80,0.25);}
.rank-medal{font-size:24px;min-width:32px;text-align:center;}
.rank-info{flex:1;}
.rank-name{font-family:'Jua',sans-serif;font-size:19px;color:#fff;}
.rank-voters{font-size:11px;color:rgba(255,255,255,0.4);margin-top:1px;}
.rank-avg{font-family:'Jua',sans-serif;font-size:20px;color:#FFD700;}
.restart-btn{background:#FF6B35;color:#fff;border:none;border-radius:14px;padding:13px 36px;font-family:'Jua',sans-serif;font-size:17px;cursor:pointer;transition:all .2s;margin-bottom:16px;}
.restart-btn:hover{background:#E85520;transform:translateY(-2px);}
.conn-badge{position:fixed;top:12px;left:12px;font-size:11px;padding:4px 10px;border-radius:20px;font-family:'Jua',sans-serif;z-index:998;}
.conn-badge.ok{background:#4CAF50;color:#fff;}
.conn-badge.err{background:#f44336;color:#fff;}
</style>
</head>
<body>

<div class="conn-badge ok" id="conn-badge">🟢 연결됨</div>

<!-- 비밀번호 모달 -->
<div class="modal-bg" id="pw-modal">
  <div class="modal">
    <h3>🔒 선생님 전용</h3>
    <p>비밀번호를 입력해주세요</p>
    <input type="password" id="pw-input" placeholder="****" maxlength="6">
    <div class="modal-btns">
      <button class="modal-cancel" id="pw-cancel">취소</button>
      <button class="modal-ok" id="pw-ok">확인</button>
    </div>
  </div>
</div>

<!-- 모드 선택 -->
<div class="screen active" id="mode-screen">
  <div class="mode-title">🎬 동영상 경연대회</div>
  <div class="mode-sub">역할을 선택해주세요</div>
  <div class="mode-cards">
    <div class="mode-card" id="btn-teacher">
      <div class="mode-card-icon">👩‍🏫</div>
      <div class="mode-card-title">선생님 🔒</div>
      <div class="mode-card-desc">작품 수 설정 · 투표 진행 · 순위 공개</div>
    </div>
    <div class="mode-card" id="btn-student">
      <div class="mode-card-icon">🧑‍🎓</div>
      <div class="mode-card-title">학생</div>
      <div class="mode-card-desc">별점으로 작품 평가하기</div>
    </div>
  </div>
</div>

<!-- 선생님 설정 -->
<div class="screen" id="teacher-screen">
  <div class="teacher-card">
    <span class="t-label">작품 수</span>
    <div class="count-wrap">
      <button class="count-btn minus" id="btn-minus">－</button>
      <div>
        <div class="count-num" id="count-display">15</div>
        <div class="count-unit">개</div>
      </div>
      <button class="count-btn plus" id="btn-plus">＋</button>
    </div>
    <button class="t-start-btn" id="btn-tstart">투표 시작 🚀</button>
  </div>
</div>

<!-- 선생님 진행 -->
<div class="screen" id="teacher-control">
  <div class="ctrl-header">
    <h2>📊 투표 현황</h2>
    <div class="ctrl-sub" id="ctrl-sub"></div>
  </div>
  <div class="ctrl-card">
    <div class="ctrl-work-num" id="ctrl-work-num">1</div>
    <div class="ctrl-work-label">번 작품 투표 중</div>
    <div class="vote-progress">
      <div class="vote-done-num" id="vote-done-num">0</div>
      <div class="vote-total-num" id="vote-total-num">/0</div>
      <div class="vote-label">명 완료</div>
    </div>
    <div class="live-dots" id="live-dots"></div>
    <button class="ctrl-next-btn" id="btn-next">다음 작품으로 ▶</button>
  </div>
  <button class="ctrl-result-btn" id="btn-result">🏆 최종 순위 공개</button>
</div>

<!-- 학생 투표 -->
<div class="screen" id="vote-screen">
  <div class="progress-area">
    <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
    <div class="progress-text" id="prog-text">대기 중...</div>
  </div>
  <div class="vote-card">
    <div class="wait-view" id="wait-view" style="display:flex;">
      <div class="wait-emoji">⏳</div>
      <div class="wait-text">선생님을 기다리는 중...</div>
      <div class="wait-sub">곧 투표가 시작돼요!</div>
    </div>
    <div id="vote-view" style="display:none;">
      <div class="work-pill" id="work-pill"></div>
      <div class="work-name" id="work-name"></div>
      <div class="stars-row" id="stars-row"></div>
      <div class="score-msg" id="score-msg">별을 눌러 점수를 주세요 ⬆️</div>
      <button class="submit-btn" id="submit-btn" disabled>점수 제출 ✓</button>
    </div>
    <div class="done-view" id="done-view" style="display:none;">
      <div class="done-emoji-el" id="done-emoji">🎉</div>
      <div class="done-text-el" id="done-text"></div>
      <div class="done-sub">선생님이 다음으로 넘길 때까지 기다려요</div>
    </div>
  </div>
</div>

<!-- 결과 -->
<div class="screen" id="result-screen">
  <div class="result-title">🏆 최종 순위!</div>
  <div class="result-sub" id="result-sub"></div>
  <div class="podium-wrap" id="podium"></div>
  <div class="rank-list" id="rank-list"></div>
  <button class="restart-btn" id="btn-restart">🔄 처음부터 다시</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyDrv4xG2PAknLP1cx3wthA4xJEjiKcFObE",
  authDomain:"school-steps-a0b18.firebaseapp.com",
  databaseURL:"https://school-steps-a0b18-default-rtdb.firebaseio.com",
  projectId:"school-steps-a0b18",
  storageBucket:"school-steps-a0b18.firebasestorage.app",
  messagingSenderId:"703455419879",
  appId:"1:703455419879:web:d81c736f0b46a1a5177142"
});
const db = firebase.database();
const SESSION = "vote_session3";
const TEACHER_PW = "1234"; // ← 비밀번호 여기서 변경 가능

let totalWorks = 15;
let currentStar = 0;
let myVoted = {};

// 연결 상태
db.ref('.info/connected').on('value', snap => {
  const b = document.getElementById('conn-badge');
  if(snap.val()){b.className='conn-badge ok';b.textContent='🟢 연결됨';}
  else{b.className='conn-badge err';b.textContent='🔴 연결 끊김';}
});

// ── 비밀번호 모달 ──
document.getElementById('btn-teacher').onclick = () => {
  document.getElementById('pw-input').value='';
  document.getElementById('pw-input').classList.remove('error');
  document.getElementById('pw-modal').classList.add('show');
  setTimeout(()=>document.getElementById('pw-input').focus(),100);
};
document.getElementById('pw-cancel').onclick = () => document.getElementById('pw-modal').classList.remove('show');
document.getElementById('pw-ok').onclick = checkPW;
document.getElementById('pw-input').onkeydown = e => { if(e.key==='Enter') checkPW(); };

function checkPW(){
  const val = document.getElementById('pw-input').value;
  if(val === TEACHER_PW){
    document.getElementById('pw-modal').classList.remove('show');
    showScreen('teacher-screen');
  } else {
    const inp = document.getElementById('pw-input');
    inp.classList.add('error');
    inp.value='';
    setTimeout(()=>inp.classList.remove('error'),400);
  }
}

// ── 학생 ──
document.getElementById('btn-student').onclick = () => {
  showScreen('vote-screen');
  listenSession();
};

// ── 선생님 설정 ──
document.getElementById('btn-minus').onclick = () => {
  totalWorks=Math.max(2,totalWorks-1);
  document.getElementById('count-display').textContent=totalWorks;
};
document.getElementById('btn-plus').onclick = () => {
  totalWorks=Math.min(30,totalWorks+1);
  document.getElementById('count-display').textContent=totalWorks;
};
document.getElementById('btn-tstart').onclick = () => {
  db.ref(SESSION).set({status:'voting',currentWork:0,totalWorks:totalWorks,votes:{}})
    .then(()=>{ showScreen('teacher-control'); listenTeacher(); });
};
document.getElementById('btn-next').onclick = nextWork;
document.getElementById('btn-result').onclick = showResult;
document.getElementById('btn-restart').onclick = restart;
document.getElementById('submit-btn').onclick = submitVote;

// ── 선생님 현황 ──
function listenTeacher(){
  db.ref(SESSION).on('value', snap=>{
    const data=snap.val(); if(!data) return;
    const idx=data.currentWork, total=data.totalWorks;
    document.getElementById('ctrl-work-num').textContent=idx+1;
    document.getElementById('ctrl-sub').textContent=`전체 ${total}개 작품`;
    const workVotes=data.votes?(data.votes['work_'+idx]||{}):{};
    const votedCount=Object.keys(workVotes).length;
    document.getElementById('vote-done-num').textContent=votedCount;
    document.getElementById('vote-total-num').textContent='/'+total;
    const dots=document.getElementById('live-dots');
    dots.innerHTML='';
    for(let i=0;i<Math.min(total,25);i++){
      const d=document.createElement('div');
      d.className='dot'+(i<votedCount?' voted':'');
      dots.appendChild(d);
    }
  });
}

function nextWork(){
  db.ref(SESSION+'/currentWork').once('value').then(snap=>{
    const cur=snap.val();
    db.ref(SESSION+'/totalWorks').once('value').then(ts=>{
      if(cur+1>=ts.val()){alert('마지막 작품이에요! 순위 공개 버튼을 눌러주세요.');return;}
      db.ref(SESSION+'/currentWork').set(cur+1);
    });
  });
}

function showResult(){
  db.ref(SESSION).once('value').then(snap=>{
    const data=snap.val(); if(!data) return;
    db.ref(SESSION+'/status').set('result');
    renderResult(data);
    showScreen('result-screen');
  });
}

// ── 학생 투표 감시 ──
function listenSession(){
  db.ref(SESSION).on('value', snap=>{
    const data=snap.val();
    if(!data){showVoteView('wait');return;}
    if(data.status==='result'){renderResult(data);showScreen('result-screen');return;}
    const idx=data.currentWork, total=data.totalWorks;
    document.getElementById('prog-fill').style.width=(idx/total*100)+'%';
    document.getElementById('prog-text').textContent=`${idx+1} / ${total} 작품`;
    if(myVoted[idx]){
      showVoteView('done');
    } else {
      showVoteView('vote');
      document.getElementById('work-pill').textContent=`작품 ${idx+1}`;
      document.getElementById('work-name').textContent=`${idx+1}번 작품`;
      document.getElementById('score-msg').textContent='별을 눌러 점수를 주세요 ⬆️';
      document.getElementById('submit-btn').disabled=true;
      currentStar=0;
      renderStars(0);
    }
  });
}

function showVoteView(mode){
  document.getElementById('wait-view').style.display=mode==='wait'?'flex':'none';
  document.getElementById('vote-view').style.display=mode==='vote'?'block':'none';
  document.getElementById('done-view').style.display=mode==='done'?'flex':'none';
}

function renderStars(val){
  const row=document.getElementById('stars-row');
  row.innerHTML='';
  for(let i=1;i<=5;i++){
    const s=document.createElement('span');
    s.className='star-btn'+(i<=val?' on':'');
    s.textContent='⭐';
    const v=i; // ★ 클로저 캡처 핵심!
    s.onclick=()=>selectStar(v);
    row.appendChild(s);
  }
}

function selectStar(val){
  currentStar=val;
  renderStars(val);
  const msgs=['','별로예요 😕','괜찮아요 😐','좋아요 😊','훌륭해요 😄','최고예요! 🤩'];
  document.getElementById('score-msg').textContent='⭐'.repeat(val)+'  '+msgs[val];
  document.getElementById('submit-btn').disabled=false;
}

function submitVote(){
  if(!currentStar||currentStar===0) return;
  const scoreToSave=currentStar; // ★ 제출 시점 값 고정
  db.ref(SESSION+'/currentWork').once('value').then(snap=>{
    const idx=snap.val();
    if(myVoted[idx]) return;
    const uid='u_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
    db.ref(`${SESSION}/votes/work_${idx}/${uid}`).set(scoreToSave).then(()=>{
      myVoted[idx]=true;
      showVoteView('done');
      document.getElementById('done-emoji').textContent=scoreToSave>=4?'🎉':'👍';
      document.getElementById('done-text').textContent='⭐'.repeat(scoreToSave)+' '+scoreToSave+'점 제출!';
    });
  });
}

// ── 결과 ──
function renderResult(data){
  const total=data.totalWorks, votes=data.votes||{};
  const ranked=[];
  for(let i=0;i<total;i++){
    const wv=votes['work_'+i]||{};
    const arr=Object.values(wv).map(Number);
    ranked.push({num:i+1,avg:arr.length?parseFloat((arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(2)):0,votes:arr.length});
  }
  ranked.sort((a,b)=>b.avg-a.avg||b.votes-a.votes);
  document.getElementById('result-sub').textContent=`총 ${total}개 작품 경연 결과`;
  const top3=ranked.slice(0,3);
  const podOrder=top3.length>=2?[top3[1]||top3[0],top3[0],top3[2]||null].filter(Boolean):top3;
  const podClass=['p2','p1','p3'];
  const podIcon=['🥈','🥇','🥉'];
  document.getElementById('podium').innerHTML=podOrder.map((w,i)=>`
    <div class="pod ${podClass[i]}"><div class="pod-icon">${podIcon[i]}</div>
    <div class="pod-num">${w.num}번 작품</div><div class="pod-score">⭐${w.avg.toFixed(1)}</div></div>`).join('');
  const medals=['🥇','🥈','🥉'];
  document.getElementById('rank-list').innerHTML=ranked.map((w,i)=>`
    <div class="rank-row ${i<3?'r'+(i+1):''}" style="opacity:0;transform:translateX(24px);" id="rr${i}">
      <div class="rank-medal">${i<3?medals[i]:(i+1)+'위'}</div>
      <div class="rank-info"><div class="rank-name">${w.num}번 작품</div>
      <div class="rank-voters">${w.votes}명 투표</div></div>
      <div class="rank-avg">⭐${w.avg.toFixed(1)}</div></div>`).join('');
  ranked.forEach((_,i)=>setTimeout(()=>{
    const el=document.getElementById('rr'+i);
    if(el){el.style.transition='all .4s';el.style.opacity='1';el.style.transform='translateX(0)';}
  },i*120+300));
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function restart(){
  db.ref(SESSION).remove();
  myVoted={};currentStar=0;totalWorks=15;
  document.getElementById('count-display').textContent='15';
  showScreen('mode-screen');
}
</script>
</body>
</html>
